services:
  - type: web
    name: project32-docker
    env: docker
    rootDir: project32
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_COLLECTION
        sync: false
      - key: PDF_ENGINE
        value: python
      - key: PYTHON
        value: python3
