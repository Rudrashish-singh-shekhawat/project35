services:
  - type: web
    name: project32-node
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm install && (python3 -m pip install --upgrade pip || python -m pip install --upgrade pip) && (python3 -m pip install --target ./python_packages -r requirements.txt || python -m pip install --target ./python_packages -r requirements.txt)
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_COLLECTION
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PDF_ENGINE
        value: python
      - key: PYTHON
        value: python3
