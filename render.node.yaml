services:
  - type: web
    name: project32-node
    runtime: node
    rootDir: project32
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_COLLECTION
        sync: false
      - key: PDF_ENGINE
        value: node
      - key: PDF_FALLBACK_TO_NODE
        value: true
